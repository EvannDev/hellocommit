# ── API secrets ───────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hellocommit.api.fullname" . }}
  labels:
    {{- include "hellocommit.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
type: Opaque
stringData:
  github-token: {{ .Values.api.env.githubToken | quote }}
---
# ── Frontend secrets ──────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hellocommit.frontend.fullname" . }}
  labels:
    {{- include "hellocommit.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
type: Opaque
stringData:
  auth-secret: {{ .Values.frontend.env.authSecret | quote }}
  github-client-id: {{ .Values.frontend.env.githubClientId | quote }}
  github-client-secret: {{ .Values.frontend.env.githubClientSecret | quote }}
