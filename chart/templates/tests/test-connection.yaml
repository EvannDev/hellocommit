apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "hellocommit.fullname" . }}-test-connection"
  labels:
    {{- include "hellocommit.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: test-api
      image: busybox
      command: ['wget']
      args:
        - '--spider'
        - '{{ include "hellocommit.api.fullname" . }}:{{ .Values.api.service.port }}/api/health'
    - name: test-frontend
      image: busybox
      command: ['wget']
      args:
        - '--spider'
        - '{{ include "hellocommit.frontend.fullname" . }}:{{ .Values.frontend.service.port }}'
