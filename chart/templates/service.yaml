# ── API ───────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hellocommit.api.fullname" . }}
  labels:
    {{- include "hellocommit.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "hellocommit.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
# ── Frontend ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hellocommit.frontend.fullname" . }}
  labels:
    {{- include "hellocommit.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "hellocommit.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
